<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI 安全日志分析平台</title>
    <!-- 使用 marked 渲染 Markdown 报告 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 使用 highlight.js 增强代码块显示（可选） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- 字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            color: #eef2ff;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* 头部 */
        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5f3fc, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .header p {
            color: #8b9bcf;
            margin-top: 0.5rem;
            font-size: 0.95rem;
        }

        /* 卡片样式 */
        .card {
            background: rgba(18, 25, 45, 0.75);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            border: 1px solid rgba(56, 78, 118, 0.4);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            padding: 1.8rem;
            transition: all 0.2s ease;
        }

        /* 上传区域 */
        .upload-area {
            border: 2px dashed #3b4b6e;
            border-radius: 1.2rem;
            background: rgba(12, 18, 34, 0.6);
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .upload-area:hover {
            border-color: #6366f1;
            background: rgba(99, 102, 241, 0.05);
        }
        .upload-area i {
            font-size: 3rem;
            color: #818cf8;
            margin-bottom: 0.8rem;
        }
        .file-name {
            margin-top: 0.8rem;
            font-weight: 500;
            color: #cbd5ff;
            word-break: break-all;
        }

        /* 模式选择 */
        .mode-group {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }
        .mode-option {
            flex: 1;
            background: #111827;
            border: 1px solid #2d3a5e;
            border-radius: 1rem;
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .mode-option.active {
            border-color: #818cf8;
            background: #1e293b;
            box-shadow: 0 0 10px rgba(129, 140, 248, 0.3);
        }
        .mode-option h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.2rem;
        }
        .mode-option p {
            font-size: 0.75rem;
            color: #9ca8cf;
        }

        /* 按钮 */
        .btn {
            background: #4f46e5;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn:hover:not(:disabled) {
            background: #6366f1;
            transform: translateY(-2px);
            box-shadow: 0 6px 14px rgba(79, 70, 229, 0.4);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #4f46e5;
            color: #c7d2fe;
        }
        .btn-outline:hover:not(:disabled) {
            background: rgba(79, 70, 229, 0.2);
        }

        /* 进度条区域 */
        .progress-section {
            margin-top: 1.8rem;
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem 1.2rem;
            border-left: 4px solid #4f46e5;
        }
        .progress-bar-bg {
            background: #1e293b;
            border-radius: 1rem;
            height: 0.6rem;
            overflow: hidden;
            margin: 0.8rem 0;
        }
        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #818cf8, #4f46e5);
            border-radius: 1rem;
            transition: width 0.3s ease;
        }
        .progress-message {
            font-size: 0.85rem;
            color: #b9c3e6;
            display: flex;
            justify-content: space-between;
        }
        .step-icon {
            font-size: 0.8rem;
            margin-right: 0.4rem;
        }

        /* 报告区域 */
        .report-container {
            margin-top: 2rem;
        }
        .report-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .report-content {
            background: #0f172a;
            border-radius: 1.2rem;
            padding: 1.5rem;
            border: 1px solid #2d3a5e;
            max-height: 600px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        /* Markdown 样式 */
        .report-content h1, .report-content h2 {
            border-bottom: 1px solid #334155;
            padding-bottom: 0.3rem;
            margin-top: 1rem;
        }
        .report-content code {
            background: #1e293b;
            padding: 0.2rem 0.4rem;
            border-radius: 0.3rem;
            font-family: monospace;
        }
        .report-content pre {
            background: #0b1120;
            padding: 0.8rem;
            border-radius: 0.8rem;
            overflow-x: auto;
        }
        .badge {
            background: #1e293b;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 500;
        }

        footer {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.75rem;
            color: #5b6e9c;
        }
        @media (max-width: 680px) {
            body { padding: 1rem; }
            .card { padding: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-shield-alt"></i> 安全日志深度分析</h1>
        <p>基于 Split-Map-Reduce + AI 大模型 | 混合正则预检 | 多模式支持</p>
    </div>

    <div class="card">
        <!-- 文件上传 -->
        <div id="uploadArea" class="upload-area">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>点击或拖拽上传日志文件（支持 .log, .txt, .access）</p>
            <input type="file" id="fileInput" accept=".log,.txt,.access,text/plain" style="display: none;">
            <div id="fileName" class="file-name"></div>
        </div>

        <!-- 分析模式 -->
        <div class="mode-group">
            <div class="mode-option" data-mode="basic">
                <h3><i class="fas fa-chart-simple"></i> 基础模式</h3>
                <p>正则统计 + IOC 提取，快速预览</p>
            </div>
            <div class="mode-option active" data-mode="advanced">
                <h3><i class="fas fa-brain"></i> 高级模式 (AI)</h3>
                <p>Split-Map-Reduce + LLM 深度威胁检测</p>
            </div>
        </div>

        <div style="display: flex; justify-content: center; gap: 1rem; margin: 1rem 0 0.5rem;">
            <button id="analyzeBtn" class="btn"><i class="fas fa-play"></i> 开始分析</button>
            <button id="clearBtn" class="btn btn-outline"><i class="fas fa-eraser"></i> 清空结果</button>
        </div>

        <!-- 进度区域 -->
        <div id="progressSection" class="progress-section" style="display: none;">
            <div class="progress-message">
                <span><i class="fas fa-spinner fa-pulse step-icon"></i> <span id="stepMsg">准备就绪</span></span>
                <span id="progressPercent">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <!-- 分析报告卡片 -->
    <div id="reportCard" class="report-container" style="display: none;">
        <div class="card">
            <div class="report-header">
                <h3><i class="fas fa-file-alt"></i> 分析报告</h3>
                <div>
                    <button id="downloadReportBtn" class="btn btn-outline" style="padding: 0.4rem 1.2rem;">
                        <i class="fas fa-download"></i> 下载报告 (Markdown)
                    </button>
                </div>
            </div>
            <div id="reportContent" class="report-content">
                <!-- 动态渲染报告内容 -->
                <div class="loading-spinner">加载报告中...</div>
            </div>
        </div>
    </div>
    <footer>
        ⚡ 使用先进 MapReduce 架构 | 正则预检过滤 >90% 安全流量 | 并行 LLM 分析
    </footer>
</div>

<script>
    // DOM 元素
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const fileNameSpan = document.getElementById('fileName');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const clearBtn = document.getElementById('clearBtn');
    const progressSection = document.getElementById('progressSection');
    const stepMsgSpan = document.getElementById('stepMsg');
    const progressPercentSpan = document.getElementById('progressPercent');
    const progressFill = document.getElementById('progressFill');
    const reportCard = document.getElementById('reportCard');
    const reportContentDiv = document.getElementById('reportContent');
    const downloadBtn = document.getElementById('downloadReportBtn');

    let selectedFile = null;
    let currentMode = 'advanced';   // 默认高级模式
    let currentTaskId = null;
    let pollingInterval = null;
    let currentDownloadUrl = null;

    // 模式切换
    document.querySelectorAll('.mode-option').forEach(opt => {
        opt.addEventListener('click', () => {
            document.querySelectorAll('.mode-option').forEach(o => o.classList.remove('active'));
            opt.classList.add('active');
            currentMode = opt.getAttribute('data-mode');
        });
    });

    // 上传区域点击 & 拖拽
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#818cf8';
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.style.borderColor = '#3b4b6e';
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.style.borderColor = '#3b4b6e';
        const files = e.dataTransfer.files;
        if (files.length) handleFileSelect(files[0]);
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) handleFileSelect(e.target.files[0]);
    });

    function handleFileSelect(file) {
        selectedFile = file;
        fileNameSpan.innerHTML = `<i class="fas fa-file"></i> ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
        // 重置报告显示
        resetReport();
    }

    function resetReport() {
        if (pollingInterval) clearInterval(pollingInterval);
        currentTaskId = null;
        reportCard.style.display = 'none';
        progressSection.style.display = 'none';
        currentDownloadUrl = null;
        reportContentDiv.innerHTML = '';
    }

    // 开始分析
    analyzeBtn.addEventListener('click', async () => {
        if (!selectedFile) {
            alert('请先选择或拖拽一个日志文件');
            return;
        }
        if (pollingInterval) clearInterval(pollingInterval);
        resetReport();
        
        // 显示进度区
        progressSection.style.display = 'block';
        updateProgressUI(0, '正在上传文件并启动分析...');
        analyzeBtn.disabled = true;
        analyzeBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> 提交中...';

        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('mode', currentMode);

        try {
            const response = await fetch('/analyze_async', {
                method: 'POST',
                body: formData
            });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error || '请求失败');
            }
            const data = await response.json();
            currentTaskId = data.task_id;
            // 开始轮询状态
            startPolling(currentTaskId);
        } catch (err) {
            console.error(err);
            alert('启动分析失败: ' + err.message);
            progressSection.style.display = 'none';
            analyzeBtn.disabled = false;
            analyzeBtn.innerHTML = '<i class="fas fa-play"></i> 开始分析';
        }
    });

    function startPolling(taskId) {
        if (pollingInterval) clearInterval(pollingInterval);
        pollingInterval = setInterval(async () => {
            try {
                const res = await fetch(`/status/${taskId}`);
                if (!res.ok) {
                    if (res.status === 404) {
                        stopPollingAndReset('任务不存在，请重新上传');
                    }
                    return;
                }
                const task = await res.json();
                // 更新进度
                const progress = task.progress || 0;
                const message = task.message || '处理中...';
                updateProgressUI(progress, message);
                
                // 完成或失败处理
                if (task.status === 'completed') {
                    stopPollingAndReset(null);
                    // 显示报告
                    displayReport(task);
                    analyzeBtn.disabled = false;
                    analyzeBtn.innerHTML = '<i class="fas fa-play"></i> 开始分析';
                } else if (task.status === 'failed') {
                    stopPollingAndReset(task.message || '分析失败');
                    analyzeBtn.disabled = false;
                    analyzeBtn.innerHTML = '<i class="fas fa-play"></i> 开始分析';
                }
            } catch (err) {
                console.error('轮询出错', err);
            }
        }, 1500);
    }

    function updateProgressUI(percent, msg) {
        const p = Math.min(100, Math.max(0, percent));
        progressFill.style.width = `${p}%`;
        progressPercentSpan.innerText = `${p}%`;
        stepMsgSpan.innerHTML = msg;
    }

    function stopPollingAndReset(errorMsg = null) {
        if (pollingInterval) {
            clearInterval(pollingInterval);
            pollingInterval = null;
        }
        if (errorMsg) {
            alert(errorMsg);
            progressSection.style.display = 'none';
        }
    }

    // 展示报告 (Markdown 渲染)
    function displayReport(task) {
        let rawResult = task.result;
        let downloadUrl = task.download_url;
        currentDownloadUrl = downloadUrl;
        
        if (!rawResult) {
            reportContentDiv.innerHTML = '<div class="badge">⚠️ 未获取到报告内容</div>';
            reportCard.style.display = 'block';
            return;
        }
        
        // 如果结果是对象，转为字符串（一般后端已经转成字符串）
        let markdownText = (typeof rawResult === 'string') ? rawResult : JSON.stringify(rawResult, null, 2);
        
        // 使用 marked 渲染 markdown
        try {
            const html = marked.parse(markdownText);
            reportContentDiv.innerHTML = html;
            // 高亮代码块
            if (typeof hljs !== 'undefined') {
                document.querySelectorAll('#reportContent pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
        } catch(e) {
            reportContentDiv.innerHTML = `<pre>${escapeHtml(markdownText)}</pre>`;
        }
        
        reportCard.style.display = 'block';
        // 下载按钮事件
        downloadBtn.onclick = () => {
            if (currentDownloadUrl) {
                window.location.href = currentDownloadUrl;
            } else {
                // 如果没有 download_url，尝试创建 blob 下载
                const blob = new Blob([markdownText], { type: 'text/markdown' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `security_report_${currentTaskId || 'default'}.md`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }
        };
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 清空结果
    clearBtn.addEventListener('click', () => {
        if (pollingInterval) clearInterval(pollingInterval);
        resetReport();
        selectedFile = null;
        fileNameSpan.innerHTML = '';
        fileInput.value = '';
        analyzeBtn.disabled = false;
        analyzeBtn.innerHTML = '<i class="fas fa-play"></i> 开始分析';
        progressSection.style.display = 'none';
        reportCard.style.display = 'none';
    });
</script>
</body>
</html>
